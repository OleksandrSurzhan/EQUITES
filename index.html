
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EQUITES IP Development LLC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100vh;
            height: 100dvh; /* Корректна висота для мобільних браузерів */
            background-color: #050505; /* Чорний фон під колір картинки */
            overflow: hidden; /* Видаляємо скролбари */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain; /* Картинка масштабується без обрізання та спотворень */
        }
    </style>
</head>
<body>

    <img src="EQ_logo.jpg" alt="EQUITES IP Development LLC">

</body>
</html>
