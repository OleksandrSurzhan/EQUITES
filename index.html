<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EQUITES IP Development LLC</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 800px;
            padding: 40px 20px;
        }
        h1 {
            color: #c5a059;
            font-size: 3.5rem;
            letter-spacing: 4px;
            margin-bottom: 0;
            text-transform: uppercase;
        }
        h2 {
            color: #8e8e8e;
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-top: 5px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.8;
            color: #a0a0a0;
        }
        .badge {
            border: 1px solid #c5a059;
            color: #c5a059;
            padding: 12px 30px;
            border-radius: 30px;
            display: inline-block;
            margin-top: 30px;
            font-weight: 600;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>EQUITES</h1>
        <h2>IP Development LLC</h2>
        <p>Розробка інноваційних інтернет-стартапів та розвиток об'єктів інтелектуальної власності.</p>
        <div class="badge">Сайт у розробці</div>
